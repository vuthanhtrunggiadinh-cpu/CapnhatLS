<style>

  body{font-family:'Times New Roman',serif;font-size:13px;background:#f5f5f0;color:#1a1a1a;padding:16px}

  .subtitle{text-align:center;font-size:12px;color:#555;margin-bottom:16px}

  .toolbar{background:#fff;border:1px solid #ccc;border-radius:6px;padding:12px 14px;margin-bottom:14px;display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end}
  .tb-group{display:flex;flex-direction:column;gap:3px}
  .tb-label{font-size:11px;color:#555;font-weight:bold}
  select,input[type=date]{font-family:'Times New Roman',serif;font-size:12px;padding:4px 7px;border:1px solid #bbb;border-radius:4px;background:#fff;color:#1a1a1a}

  .btn-sec{background:#fff;color:#17375E}
  .btn-sec:hover{background:#eef2f7}

  .tabs{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap}
  .tab{padding:5px 14px;border:1px solid #bbb;border-radius:4px 4px 0 0;cursor:pointer;font-size:12px;background:#e8e8e8;color:#555}
  .tab.active{background:#17375E;color:#fff;border-color:#17375E}

  .panel{display:none}
  .panel.active{display:block}

  /* Panel 1 — Hiện tại */
  .grid-5{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:14px}
  .card{background:#fff;border:1px solid #ccc;border-radius:6px;padding:10px 12px}
  .card-title{font-size:12px;color:#17375E;font-weight:bold;margin-bottom:5px;border-bottom:1px solid #e0e8f0;padding-bottom:4px}
  .card-vb{font-size:10px;color:#888;margin-bottom:6px;line-height:1.5}
  .kh-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:0.5px solid #f0f0f0;font-size:12px}
  .kh-label{color:#444}
  .kh-val{font-weight:bold;color:#17375E;font-size:13px}
  .kh-val.cn{color:#c0392b}
  .nim-row{display:flex;justify-content:space-between;padding:3px 0;font-size:11px}
  .nim-label{color:#555}
  .nim-val{font-weight:bold}
  .nim-good{color:#27ae60}
  .nim-warn{color:#e67e22}

  .nim-box{background:#fff;border:1px solid #ccc;border-radius:6px;padding:12px 14px;margin-bottom:14px;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .nim-box h3{font-size:13px;font-weight:bold;color:#17375E;margin-bottom:10px}
  table{width:100%;border-collapse:collapse;font-size:12px}
  th{background:#17375E;color:#fff;padding:5px 8px;text-align:center;font-weight:normal;font-size:11px}
  th.left{text-align:left}
  td{padding:4px 8px;border-bottom:0.5px solid #e8e8e8;vertical-align:middle}
  tr:nth-child(even){background:#f8f8f5}
  .td-kh{font-size:11px;color:#333}
  .td-num{text-align:center;font-weight:bold}
  .td-nim-good{text-align:center;color:#27ae60;font-weight:bold}
  .td-nim-warn{text-align:center;color:#e67e22;font-weight:bold}

  .hist-table{background:#fff;border:1px solid #ccc;border-radius:6px;overflow-x:auto;-webkit-overflow-scrolling:touch}

  .compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}

  .note{font-size:11px;color:#888;padding:8px 0;font-style:italic}

  .section-head{font-size:12px;font-weight:bold;color:#17375E;padding:6px 0 4px;border-bottom:1px solid #ddd;margin-bottom:8px}

// ── Google Sheets loader ────────────────────────────────────────────
// ── Nguồn dữ liệu — chọn một trong hai hoặc để trống để dùng offline ──
// Phương án A — GitHub Pages: để trống, tool tự fetch file JSON cùng thư mục
// Phương án B — Google Sheets: dán URL publish CSV của Sheets vào đây
const SHEET_CSV_URL = '';   // <-- dán URL Google Sheets vào đây (nếu dùng Sheets)

let DB = null;

// Parse CSV từ Sheets thành cấu trúc DB
function parseSheetCSV(lsText, bangText) {
  function csvRows(text) {
    return text.trim().split('\n').slice(1).map(line => {
      const cols = [];
      let cur = '', inQ = false;
      for (let i = 0; i < line.length; i++) {
        const c = line[i];
        if (c === '"') { inQ = !inQ; }
        else if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
        else cur += c;
      }
      cols.push(cur.trim());
      return cols;
    }).filter(r => r[0]);
  }

  const lsRows = csvRows(lsText);
  const bangRows = csvRows(bangText);

  // Index bang_ls theo vb_id
  const bangIdx = {};
  for (const r of bangRows) {
    const [vb_id,,,,,,ky_han,,doi_tuong,gia_tri] = r;
    if (!bangIdx[vb_id]) bangIdx[vb_id] = [];
    const entry = {ky_han, doi_tuong, gia_tri: parseFloat(gia_tri)};
    if (!entry.doi_tuong) entry.doi_tuong = 'all';
    bangIdx[vb_id].push(entry);
  }

  const loai_lai_suat = {
    "1":"Trần LSHĐ thông thường (niêm yết)",
    "2":"Trần LSHĐ chính sách khách hàng (cạnh tranh)",
    "3":"Sàn lãi suất cho vay thông thường",
    "4":"Giá bán vốn (FTP bán)",
    "5":"Giá mua vốn (FTP mua)"
  };

  return {
    meta: { loai_lai_suat, cap_nhat_lan_cuoi: lsRows[0]?.[2] || '' },
    lich_su: lsRows.map(r => ({
      id: r[0], so_vb: r[1], ngay_ky: r[2],
      hieu_luc_tu: r[3], hieu_luc_den: r[4] || null,
      loai: parseInt(r[5]), ten_loai: r[6], ghi_chu: r[7],
      bang_ls: bangIdx[r[0]] || []
    }))
  };
}

async function loadFromSheets(csvUrl) {
  // Google Sheets publish URL: tab 1 = lich_su (gid=0), tab 2 = bang_ls (gid=...)
  // Lấy gid của sheet bang_ls từ URL (thường là số khác 0)
  const bangUrl = csvUrl.replace(/gid=\d+/, 'gid=BANG_LS_GID');  // user điền GID
  const [r1, r2] = await Promise.all([fetch(csvUrl), fetch(bangUrl)]);
  if (!r1.ok || !r2.ok) throw new Error('Fetch failed');
  return parseSheetCSV(await r1.text(), await r2.text());
}

async function initDB() {
  const status = document.getElementById('load-status');

  // Phương án A — fetch JSON cùng thư mục (GitHub Pages hoặc web server)
  // Chỉ thử khi đang chạy trên HTTP/HTTPS (không phải mở file:// local)
  const isOnline = location.protocol === 'https:' || location.protocol === 'http:';

  if (isOnline && !SHEET_CSV_URL) {
    try {
      status.textContent = 'Đang tải dữ liệu...';
      const r = await fetch('lich_su_lai_suat.json?t=' + Date.now());
      if (!r.ok) throw new Error('fetch failed');
      DB = await r.json();
      status.textContent = '✓ Dữ liệu cập nhật đến ' + (DB.meta.cap_nhat_lan_cuoi || '');
    } catch(e) {
      DB = FALLBACK_DB;
      status.textContent = '⚠ Dùng dữ liệu offline';
    }
  // Phương án B — fetch từ Google Sheets CSV
  } else if (SHEET_CSV_URL && SHEET_CSV_URL.includes('docs.google.com')) {
    try {
      status.textContent = 'Đang tải dữ liệu từ Google Sheets...';
      DB = await loadFromSheets(SHEET_CSV_URL);
      status.textContent = '✓ Dữ liệu từ Google Sheets — ' + DB.meta.cap_nhat_lan_cuoi;
    } catch(e) {
      DB = FALLBACK_DB;
      status.textContent = '⚠ Dùng dữ liệu offline (không kết nối được Sheets)';
    }
  // Phương án C — offline (mở file:// local hoặc không cấu hình)
  } else {
    DB = FALLBACK_DB;
    status.style.display = 'none';
  }
  const today = new Date().toISOString().slice(0,10);
  document.getElementById('p0-date').value = today;
  document.getElementById('p2-dateB').value = today;

  // Cập nhật subtitle từ meta
  const d = DB.meta.cap_nhat_lan_cuoi || '';
  if (d) {
    const parts = d.split('-');
    const label = parts[2] + '/' + parts[1] + '/' + parts[0];
    document.getElementById('subtitle-text').textContent =
      'Hệ thống 5 chỉ tiêu lãi suất • Cập nhật đến ' + label;
  }

  renderPanel0(); renderPanel1(); renderPanel2(); renderPanel3();
}

function fmtDate(d){if(!d)return'hiện tại';const p=d.split('-');return p[2]+'/'+p[1]+'/'+p[0]}
function fmtNum(n){return n!=null?n.toFixed(1)+'%':'—'}

function activeVBs(date, loai){
  return DB.lich_su.filter(vb=>{
    if(vb.loai!==loai)return false;
    if(vb.hieu_luc_tu>date)return false;
    if(vb.hieu_luc_den && vb.hieu_luc_den<date)return false;
    return true;
  }).sort((a,b)=>b.hieu_luc_tu.localeCompare(a.hieu_luc_tu));
}

function getVal(date, loai, kyhan, dt){
  const vbs=activeVBs(date,loai);
  if(!vbs.length)return null;
  const vb=vbs[0];
  const rows=vb.bang_ls.filter(r=>r.ky_han===kyhan&&(r.doi_tuong===dt||r.doi_tuong==='all'||!r.doi_tuong));
  return rows.length?rows[0].gia_tri:null;
}

function getAllVals(date, loai, dt){
  const vbs=activeVBs(date,loai);
  if(!vbs.length)return{vb:null,rows:[]};
  const vb=vbs[0];
  const rows=vb.bang_ls.filter(r=>r.doi_tuong===dt||r.doi_tuong==='all'||!r.doi_tuong);
  return{vb,rows};
}

    const {vb,rows}=getAllVals(date,l,dt);
    html+=`<div class="card">`;
    html+=`<div class="card-title">${['','①','②','③','④','⑤'][l]} ${loaiNames[l]}</div>`;
    if(vb){
      html+=`<div class="card-vb">${vb.so_vb} | ${fmtDate(vb.hieu_luc_tu)}<span class="tag ${vb.hieu_luc_den?'tag-exp':'tag-cur'}">${vb.hieu_luc_den?'có hạn':'đang HLực'}</span></div>`;
      if(rows.length){
        rows.forEach(r=>{
          html+=`<div class="kh-row"><span class="kh-label">${KH_LABEL[r.ky_han]||r.ky_han}</span><span class="kh-val">${fmtNum(r.gia_tri)}</span></div>`;
        });
      }else html+=`<div class="no-data">Không có dữ liệu kỳ hạn</div>`;
    }else html+=`<div class="no-data">Không có VB hiệu lực</div>`;
    html+='</div>';
  }
  cards.innerHTML=html;

  // NIM table
  const nim=document.getElementById('p0-nim');
  let nh='<table><thead><tr><th class="left">Kỳ hạn HĐV</th><th>Trần HĐ TT<br>(①)</th><th>Trần HĐ CSKH<br>(②)</th><th>Sàn CV<br>(③)</th><th>FTP bán<br>(④)</th><th>FTP mua<br>(⑤)</th><th>NIM.DN<br>=③–④</th><th>NIM.NV<br>=⑤–①</th></tr></thead><tbody>';
  NIM_MAP.forEach(m=>{
    const v1=getVal(date,1,m.hd,dt);
    const v2=getVal(date,2,m.hd,dt);
    const v3=getVal(date,3,m.cv_sxkd,dt)||getVal(date,3,m.cv_sxkd,'CN');
    const v4=getVal(date,4,m.ftpb,dt);
    const v5=getVal(date,5,m.ftpm,dt);
    const nimDN=(v3!=null&&v4!=null)?+(v3-v4).toFixed(2):null;
    const nimNV=(v5!=null&&v1!=null)?+(v5-v1).toFixed(2):null;
    const dnClass=nimDN!=null?(nimDN>=1?'td-nim-good':'td-nim-warn'):'';
    const nvClass=nimNV!=null?(nimNV>=0.5?'td-nim-good':'td-nim-warn'):'';
    nh+=`<tr><td class="td-kh">${m.label}</td><td class="td-num">${fmtNum(v1)}</td><td class="td-num">${fmtNum(v2)}</td><td class="td-num">${fmtNum(v3)}</td><td class="td-num">${fmtNum(v4)}</td><td class="td-num">${fmtNum(v5)}</td><td class="${dnClass}">${nimDN!=null?nimDN.toFixed(2)+'%':'—'}</td><td class="${nvClass}">${nimNV!=null?nimNV.toFixed(2)+'%':'—'}</td></tr>`;
  });
  nh+='</tbody></table>';
  nh+='<p class="note" style="margin-top:6px">NIM.DN = Sàn LSCV (SXKD thông thường) – FTP bán &nbsp;|&nbsp; NIM.NV = FTP mua – Trần LSHĐ thông thường &nbsp;|&nbsp; Màu xanh: NIM đạt ngưỡng tốt</p>';
  nim.innerHTML=nh;
}

function renderPanel1(){
  const loai=+document.getElementById('p1-loai').value;
  const dt=document.getElementById('p1-dt').value;
  const vbs=DB.lich_su.filter(v=>v.loai===loai).sort((a,b)=>b.hieu_luc_tu.localeCompare(a.hieu_luc_tu));
  if(!vbs.length){document.getElementById('p1-table').innerHTML='<p class="no-data" style="padding:12px">Không có dữ liệu</p>';return;}
  // Collect all kyhan keys for this loai
  const allKH=[...new Set(vbs.flatMap(v=>v.bang_ls.filter(r=>r.doi_tuong===dt||r.doi_tuong==='all'||!r.doi_tuong).map(r=>r.ky_han)))];
  let h='<table><thead><tr><th class="left">Số VB</th><th class="left">Hiệu lực từ</th><th class="left">Đến</th>';
  allKH.forEach(k=>h+=`<th>${KH_LABEL[k]||k}</th>`);
  h+='</tr></thead><tbody>';
  vbs.forEach(vb=>{
    const isActive=!vb.hieu_luc_den;
    h+=`<tr${isActive?' style="background:#eaf3e0"':''}>`;
    h+=`<td>${vb.so_vb}${isActive?'<span class="tag tag-cur">HL</span>':''}</td>`;
    h+=`<td>${fmtDate(vb.hieu_luc_tu)}</td><td>${fmtDate(vb.hieu_luc_den)}</td>`;
    allKH.forEach(k=>{
      const r=vb.bang_ls.find(x=>x.ky_han===k&&(x.doi_tuong===dt||x.doi_tuong==='all'||!x.doi_tuong));
      h+=`<td class="td-num">${r?fmtNum(r.gia_tri):'—'}</td>`;
    });
    h+='</tr>';
  });
  h+='</tbody></table>';
  document.getElementById('p1-table').innerHTML=h;
}

function renderPanel2(){
  const dA=document.getElementById('p2-dateA').value;
  const dB=document.getElementById('p2-dateB').value;
  const dt=document.getElementById('p2-dt').value;
  let h='<div class="compare-grid">';
  for(const [label,date] of [[`Thời điểm A — ${fmtDate(dA)}`,dA],[`Thời điểm B — ${fmtDate(dB)}`,dB]]){
    h+=`<div><div class="section-head">${label}</div>`;
    for(let l=1;l<=5;l++){
      const {vb,rows}=getAllVals(date,l,dt);
      h+=`<div class="card" style="margin-bottom:8px"><div class="card-title">${DB.meta.loai_lai_suat[l]}</div>`;
      if(vb){
        h+=`<div class="card-vb">${vb.so_vb} | ${fmtDate(vb.hieu_luc_tu)}</div>`;
        rows.forEach(r=>h+=`<div class="kh-row"><span class="kh-label">${KH_LABEL[r.ky_han]||r.ky_han}</span><span class="kh-val">${fmtNum(r.gia_tri)}</span></div>`);
      }else h+=`<div class="no-data">Không có VB hiệu lực</div>`;
      h+='</div>';
    }
    h+='</div>';
  }
  h+='</div>';
  document.getElementById('p2-content').innerHTML=h;
}

function renderPanel3(){
  const sorted=[...DB.lich_su].sort((a,b)=>b.hieu_luc_tu.localeCompare(a.hieu_luc_tu));
  let h='<table><thead><tr><th class="left">Số VB</th><th class="left">Loại</th><th class="left">Hiệu lực từ</th><th class="left">Đến</th><th class="left">Ghi chú</th></tr></thead><tbody>';
  sorted.forEach(vb=>{
    const isActive=!vb.hieu_luc_den;
    h+=`<tr${isActive?' style="background:#eaf3e0"':''}>`;
    h+=`<td><b>${vb.so_vb}</b>${isActive?'<span class="tag tag-cur">HL</span>':''}</td>`;
    h+=`<td>${vb.ten_loai}</td>`;
    h+=`<td>${fmtDate(vb.hieu_luc_tu)}</td>`;
    h+=`<td>${fmtDate(vb.hieu_luc_den)}</td>`;
    h+=`<td style="font-size:11px;color:#555">${vb.ghi_chu||''}</td>`;
    h+='</tr>';
  });
  h+='</tbody></table>';
  document.getElementById('p3-content').innerHTML=h;
}

function switchTab(i){
  document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('active',i===j));
  document.querySelectorAll('.panel').forEach((p,j)=>p.classList.toggle('active',i===j));
}

initDB();
</script>

</html>
